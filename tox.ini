[tox]

envlist = py{35,36,37,38,py3},test_unit,check,lint,mypy,codecov
skip_missing_interpreters = true


[flake8]
# See <https://pycodestyle.readthedocs.io/en/latest/intro.html#error-codes>
exclude = stone/_vendor
ignore = E128,E301,E302,E305,E402,W503,W504
max-line-length = 100
# These modules import names solely for use in `# type:` comments, which
# pyflakes does not detect, producing false-positive F401 warnings.
per-file-ignores =
    stone/backend.py:F401
    stone/backends/js_client.py:F401
    stone/backends/python_helpers.py:F401
    stone/backends/python_type_stubs.py:F401
    stone/backends/python_types.py:F401
    stone/backends/tsd_helpers.py:F401
    stone/backends/tsd_types.py:F401
    test/backend_test_util.py:F401


[testenv:test_unit]

commands =
    pytest
deps =
    -rtest/requirements.txt

[testenv:check]

commands =
    python setup.py bdist_wheel sdist
    twine check dist/*

deps =
    setuptools 
    wheel 
    twine

usedevelop = true


[testenv:lint]

commands =
    flake8 setup.py example stone test
    pylint --rcfile=.pylintrc --ignore=_vendor setup.py example stone test

deps =
    flake8<6
    pylint
    # This probably breaks on Windows. See
    # <https://github.com/tox-dev/tox/issues/384>.
    -rtest/requirements.txt

usedevelop = true


[testenv:mypy]

commands =
    ./mypy-run.sh

deps =
    enum34
    mypy

usedevelop = true

[testenv:codecov]

commands =
    coverage run --rcfile=.coveragerc -m pytest
    coverage xml

deps =
    -rtest/requirements.txt
